<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomomo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="window-header app-titlebar">
        <div class="window-title">Pomomo</div>
        <div class="window-controls">
          <button id="minimize-btn" class="window-control-btn" aria-label="Minimize window">_</button>
          <button id="pin-btn" class="window-control-btn" aria-label="Pin window">📌</button>
          <button id="settings-btn" class="window-control-btn" aria-label="Open settings">⚙</button>
          <button id="close-window-btn" class="window-control-btn" aria-label="Close window">
            <img src="assets/icons/close.png" alt="Close" />
          </button>
        </div>
      </div>

      <section class="timer-card">
        <div class="timer-header">
          <img class="timer-icon" src="assets/icons/timer.png" alt="Timer icon" />
          <h2>Current step</h2>
        </div>
        <div id="current-step" class="current-step">No session started yet.</div>
        <div id="time-display" class="time-display">00:00</div>
        <div class="timer-summary">
          <span id="total-duration">Total: 0 min</span>
          <span id="end-time">Ends at --</span>
        </div>
        <div class="timer-actions">
          <button id="start-session-btn">Start session</button>
          <button id="pause-btn">Pause</button>
          <button id="reset-btn">Reset</button>
          <button id="skip-btn" class="secondary-button">Skip</button>
        </div>
      </section>
      <section class="queue-card">
        <div class="queue-header">
          <h2>Session queue</h2>
          <button id="toggle-queue-btn" class="secondary-button">Hide queue</button>
        </div>
        <div id="queue" class="queue-list"></div>
      </section>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
