<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomomo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Pomomo</h1>
        <p>Build your focus flow with customizable task and break blocks.</p>
      </header>

      <section class="controls">
        <div class="card add-block-card">
          <h2>Add a block</h2>
          <p>Create a task or break block from a dedicated window.</p>
          <button id="add-block-btn" class="icon-button">
            <img src="assets/icons/add.png" alt="Add block" />
            <span>Add Block</span>
          </button>
        </div>
      </section>

      <section class="queue-card">
        <div class="queue-header">
          <h2>Session queue</h2>
          <span>Drag blocks to reorder your plan</span>
        </div>
        <div id="queue" class="queue-list"></div>
      </section>

      <section class="timer-card">
        <div class="timer-header">
          <img class="timer-icon" src="assets/icons/timer.png" alt="Timer icon" />
          <h2>Current step</h2>
        </div>
        <div id="current-step" class="current-step">No session started yet.</div>
        <div id="time-display" class="time-display">00:00</div>
        <div class="timer-actions">
          <button id="start-session-btn">Start session</button>
          <button id="pause-btn">Pause</button>
          <button id="reset-btn">Reset</button>
        </div>
      </section>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
