<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block finished</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="notification-body">
    <div class="notification-card">
      <div class="window-header">
        <div class="window-title">Block finished</div>
      </div>
      <div>
        <div class="notification-label" id="finished-label">Finished</div>
        <p class="notification-message" id="finished-message">Your block has completed.</p>
      </div>
      <div class="notification-actions">
        <button id="pause-action-btn">Pause</button>
        <button id="continue-action-btn">Continue</button>
      </div>
    </div>

    <script src="finished-notification.js"></script>
  </body>
</html>
