<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="modal-body">
    <div class="modal-card settings-card-window">
      <div class="window-header settings-window-header">
        <div class="window-title">Settings</div>
        <button id="close-window-btn" class="window-close-btn settings-close-btn">
          <img src="assets/icons/close.png" alt="Close window" />
        </button>
      </div>

      <label class="settings-option">
        <div class="settings-option-title">Auto-Start Task</div>
        <div class="settings-option-description">Automatically start the next block when the current one finishes.</div>
        <input id="auto-start-task" type="checkbox" />
      </label>
    </div>

    <script src="settings.js"></script>
  </body>
</html>
